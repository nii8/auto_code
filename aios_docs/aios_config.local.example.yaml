# AIOS 本地项目配置示例
# 复制为 aios_config.local.yaml 后填写本机真实路径。
# aios_config.local.yaml 已被 .gitignore 忽略，不提交 Git。

# greenfield：全新项目
# brownfield：在现有项目上修改
# rebuild：旧项目只读参考，新项目从零重构
project_mode: "rebuild"

# 新项目目录，可写。
target_source_dir: "/absolute/path/to/new_project"

# 兼容字段，建议和 target_source_dir 保持一致。
source_code_dir: "/absolute/path/to/new_project"

# 旧项目目录，只读参考。
reference_source_dirs:
  - "/absolute/path/to/old_project"

# 聊天记录 / 需求说明 / 原始材料。
source_material_file: "/absolute/path/to/material.md"
initial_goal_hint: ""

# 可选：当前要执行的 initiative。建议由 <target_source_dir>/.aios/global_state.json 管理；临时覆盖时再填写。
active_initiative: ""

# 可选：项目声明的低风险 Python 包依赖。module 用于 import 检查，package 用于 pip 安装。
runtime:
  python_packages: []

# 可选：reset 时允许删除的可重建路径。默认不删除业务源码或生成产物。
reset:
  generated_paths: []

# 可选：限制 Worker prompt 中全文展开的上下文总量。
# Runner 会打印 prompt 大小、估算 token、预算使用率和截断/跳过文件。
prompt:
  context_budget_chars: 60000

# 初始化/规划预算：用于扫描源码、读取聊天记录、生成项目级规划和冻结模块目标之前的上下文闸门。
# 超过预算时应先摘要、索引、拆 initiative，不能继续全文读取和冻结模块。
planning:
  context_budget_chars: 120000

# 清洗阶段：路径绑定后先生成 .aios/ingest 和 .aios/source，再提示重启新会话。
# 清洗只能新增 .aios 文件，不能修改源码或原始聊天记录。
cleaning:
  restart_required: true
