# AIOS 启动配置
# 这是可提交的模板配置。真实项目路径写入 aios_config.local.yaml；该本地文件不提交。

# 项目模式必须由用户在新会话首轮确认；模板不默认替用户选择。
# - greenfield：全新项目
# - brownfield：在现有项目上修改
# - rebuild：旧项目只读参考，新项目从零重构
project_mode: ""

# 可写目标源码目录。复杂项目和 rebuild 模式优先填写这个字段。
target_source_dir: ""

# 兼容字段：等价于 target_source_dir。旧工具仍可读取该字段。
source_code_dir: ""

# 只读参考源码目录。rebuild 模式下填旧项目路径；AIOS / Worker 只能读取，不能修改。
reference_source_dirs: []

# 必填：原始项目材料文件。可以是聊天记录、会议纪要、录音转写、需求长文等纯文本 / Markdown 文件。
# 示例：aios_docs/你的原始材料.md
source_material_file: ""

# 可选：当前阶段一句话目标提示。不是最终目标，只是帮助 AI 生成候选目标。
# 示例：稳定短视频智能剪辑流程，优先跑通 2 个短视频样例。
initial_goal_hint: ""

# 可选：当前要执行的 initiative。为空时使用顶层 .aios 兼容模式。
# 复杂项目建议由 .aios/global_state.json 记录 active_initiative，或在本地配置中临时指定。
active_initiative: ""

# 固定策略：AIOS 工作目录固定创建在源码目录下的 .aios。
# 不需要用户填写，程序会根据 source_code_dir 自动得到：<source_code_dir>/.aios
aios_work_dir_policy: "source_code_dir/.aios"

# 固定策略：第一轮只做项目初始化。
# 可以读取源码；不修改源码；不调用 Codex/LLM 自动执行生产任务。
first_round_policy:
  allow_read_source: true
  allow_modify_source: false
  allow_execute_tasks: false

# 可选：运行前需要自动检查 / 安装的低风险 Python 包。
# 通用内核不默认绑定任何业务依赖；具体项目需要时写入本地配置或项目冻结文件。
runtime:
  python_packages: []

# 可选：reset 时允许清理的业务生成路径，路径相对 target_source_dir/source_code_dir。
# 默认只重置 .aios/runs、.aios/reports、任务状态和 state.json，不删除业务源码。
reset:
  generated_paths: []

# Prompt 构造预算：Runner 会优先放入任务 context_refs，再放项目级和当前 initiative 上下文。
# 每次执行前会打印 prompt 字符数、估算 token、预算使用率、截断/跳过文件。
# 超过预算时不再继续全文展开，避免上下文过大干扰当前任务。
prompt:
  context_budget_chars: 60000

# 初始化/规划预算：用于扫描源码、读取聊天记录、生成项目级规划和冻结模块目标之前的上下文闸门。
# 超过预算时应先摘要、索引、拆 initiative，不能继续全文读取和冻结模块。
planning:
  context_budget_chars: 120000

# 清洗阶段：路径绑定后先生成 .aios/ingest 和 .aios/source，再提示重启新会话。
# 清洗只能新增 .aios 文件，不能修改源码或原始聊天记录。
cleaning:
  restart_required: true

# LLM 配置：用于后续 Python 调用大模型。不要把 API Key 写在这里，API Key 从环境变量读取。
llm:
  provider: "openai_compatible"
  model: "qwen3.6-plus"
  base_url: "https://coding.dashscope.aliyuncs.com/v1"
  api_key_env: "OPENAI_API_KEY"
  temperature: 0.2
  timeout_seconds: 300

# Codex 配置：用于后续 Python 调用 Codex CLI。
codex:
  command: "codex"
  default_args:
    - "exec"
    - "--json"
    - "--sandbox"
    - "workspace-write"
  timeout_seconds: 3600

# 自动化刹车：防止无限循环。
limits:
  max_total_steps: 20
  max_repair_attempts: 3
  max_depth: 4
  max_runtime_minutes: 60
